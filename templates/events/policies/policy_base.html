{% extends "base.html" %}

{% block title %}{% block policy_title %}{% endblock %} | EventHub{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{% url 'events:event_list' %}">Home</a></li>
                    <li class="breadcrumb-item active">{% block breadcrumb %}{% endblock %}</li>
                </ol>
            </nav>
            
            <div class="card border-0 shadow-sm p-4 p-md-5">
                <h1 class="fw-bold mb-4">{% block page_header %}{% endblock %}</h1>
                <div class="policy-content">
                    {% block policy_content %}{% endblock %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
