{% extends "base.html" %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow">
                <div class="card-body p-4 p-md-5 text-center">
                    <div class="mb-4">
                        <i class="bi bi-check-circle display-4 text-success"></i>
                        <h2 class="fw-bold mt-2">Password Reset</h2>
                        <p class="text-muted">Your password has been successfully reset. You can now log in with your new password.</p>
                    </div>

                    <a href="{% url 'accounts:login' %}" class="btn btn-primary w-100 py-2 mt-3">
                        Login Now
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
