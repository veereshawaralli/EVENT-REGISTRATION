{% extends "base.html" %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="eh-page">
<div class="container">
<div class="row justify-content-center">
<div class="col-md-5 col-sm-10">

<div class="eh-glass">
    <div class="eh-hdr" style="background:linear-gradient(135deg,#10b981,#059669)">
        <div class="eh-hdr-icon" style="background:rgba(255,255,255,.2)"><i class="bi bi-check-circle"></i></div>
        <h4>Password Reset</h4>
        <p>Your password has been successfully updated</p>
    </div>
    <div class="eh-body text-center">
        <p class="text-muted mb-4">You can now log in with your new password.</p>
        <a href="{% url 'accounts:login' %}" class="eh-btn eh-btn-success"><i class="bi bi-box-arrow-in-right"></i> Login Now</a>
    </div>
</div>

</div>
</div>
</div>
</div>
{% endblock %}
