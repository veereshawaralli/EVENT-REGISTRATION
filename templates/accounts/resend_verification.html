{% extends "base.html" %}

{% block title %}Resend Verification{% endblock %}

{% block content %}
<div class="eh-page">
<div class="container">
<div class="row justify-content-center">
<div class="col-md-5 col-sm-10">

<div class="eh-glass">
    <div class="eh-hdr">
        <div class="eh-hdr-icon"><i class="bi bi-envelope-arrow-up"></i></div>
        <h4>Resend Verification</h4>
        <p>Enter your email to receive a new verification link</p>
    </div>
    <div class="eh-body eh-form">
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" name="email" id="email" class="form-control" required placeholder="name@example.com">
            </div>
            <button type="submit" class="eh-btn eh-btn-primary">
                <i class="bi bi-send"></i> Send Link
            </button>
        </form>
        <div class="text-center mt-4">
            <a href="{% url 'accounts:login' %}" class="eh-back" style="margin-top:0"><i class="bi bi-arrow-left"></i> Return to login</a>
        </div>
    </div>
</div>

</div>
</div>
</div>
</div>
{% endblock %}
