{% extends "base.html" %}

{% block title %}Resend Verification{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-body p-4 p-md-5">
                    <h2 class="fw-bold mb-4 text-center">Resend Verification</h2>
                    <p class="text-muted text-center mb-4">Enter your email address to receive a new verification link.</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label for="email" class="form-label fw-semibold">Email Address</label>
                            <input type="email" name="email" id="email" class="form-control rounded-pill px-4" required placeholder="name@example.com">
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow">
                                Send Link
                            </button>
                        </div>
                    </form>
                    
                    <div class="mt-4 text-center">
                        <a href="{% url 'accounts:login' %}" class="text-decoration-none small">
                            Return to login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
