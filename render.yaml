# Render Web Service Configuration
# Database: Use Neon (https://neon.tech) free PostgreSQL
# Set DATABASE_URL env var manually in Render dashboard

services:
  - type: web
    name: event-registration
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: WEB_CONCURRENCY
        value: "4"
      # Set DATABASE_URL manually in Render dashboard
      # Get it from Neon: https://neon.tech
