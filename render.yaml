# Render Web Service Configuration
# Database: Use Neon (https://neon.tech) free PostgreSQL
# Set DATABASE_URL env var manually in Render dashboard

services:
  - type: web
    name: event-registration
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        value: "veereshawaralli.work@gmail.com"
      - key: EMAIL_HOST_PASSWORD
        sync: false # Set this value manually in Render dashboard for security
      - key: DEFAULT_FROM_EMAIL
        value: "EventHub <veereshawaralli.work@gmail.com>"
      # Set DATABASE_URL manually in Render dashboard
