# Render Blueprint — Infrastructure as Code
# https://render.com/docs/blueprint-spec

databases:
  - name: event-registration-db
    plan: free
    databaseName: event_registration
    user: event_admin

services:
  - type: web
    name: event-registration
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: event-registration-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: WEB_CONCURRENCY
        value: "4"
